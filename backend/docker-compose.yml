services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: pm_uas_app:latest
    container_name: pm_uas_app
    depends_on:
      db:
        condition: service_healthy
    environment:
      - APP_ENV=local
      - APP_DEBUG=true
      - DB_HOST=db
      - DB_PORT=3306
      - DB_DATABASE=laravel
      - DB_USERNAME=laravel
      - DB_PASSWORD=secret
    volumes:
      - ./:/var/www/html:delegated
    networks:
      - laravel
    restart: unless-stopped

  web:
    image: nginx:stable-alpine
    container_name: pm_uas_web
    ports:
      - "8080:80"
    volumes:
      - ./:/var/www/html:delegated
    depends_on:
      - app
    networks:
      - laravel
    restart: unless-stopped

  db:
    image: mysql:8.0
    container_name: pm_uas_db
    environment:
      MYSQL_ROOT_PASSWORD: secret
      MYSQL_DATABASE: laravel
      MYSQL_USER: laravel
      MYSQL_PASSWORD: secret
    volumes:
      - dbdata:/var/lib/mysql
    ports:
      - "33062:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 5s
      retries: 5
    networks:
      - laravel
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: pm_uas_redis
    ports:
      - "6379:6379"
    networks:
      - laravel
    restart: unless-stopped

volumes:
  dbdata:
    driver: local

networks:
  laravel:
    driver: bridge
