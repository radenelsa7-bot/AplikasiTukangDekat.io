groups:
  - name: tukangdekat-alerts
    rules:
      - alert: HighErrorRate
        expr: increase(http_server_requests_total[5m]) > 50
        for: 2m
        labels:
          severity: page
        annotations:
          summary: "High error rate detected"
          description: "More than 50 requests in 5m resulted in errors."

      - alert: HighRequestLatency
        expr: histogram_quantile(0.95, sum(rate(http_request_duration_seconds_bucket[5m])) by (le)) > 1
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High 95th percentile latency"
          description: "95th percentile request latency exceeded 1s over 5m."

      - alert: JobFailures
        expr: increase(job_failure_total[10m]) > 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Background job failures detected"
          description: "One or more background jobs failed in the last 10 minutes."
